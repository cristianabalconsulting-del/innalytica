name: Datos Pesados (5am)

on:
  schedule:
    - cron: '47 3 * * *'     # 5:47 Espana (UTC+2) - minuto "raro" para que GitHub no lo retrase
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Generar clientes PESADOS (+ Todos)
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PBI_WORKSPACE_ID:    ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID:      ${{ secrets.PBI_DATASET_ID }}
          TICKETMASTER_KEY:    ${{ secrets.TICKETMASTER_KEY }}
          CALENDARIFIC_KEY:    ${{ secrets.CALENDARIFIC_KEY }}
          EVENTS_TTL_DAYS:     '7'
          HOLIDAYS_TTL_DAYS:   '21'
          QUERY_SPACING_MS:    '600'
          QUERY_TIMEOUT_MS:    '180000'
          GROUP:               'heavy'
        run: node scripts/generate.js
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "Pesados $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Sin cambios"
          git push || echo "nada"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
