name: Datos Rápidos 2/2 (5am)

on:
  schedule:
    - cron: '10 3 * * *'     # 5:10 España (UTC+2) — tras la tanda 1
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Generar clientes RÁPIDOS (tanda 2)
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PBI_WORKSPACE_ID:    ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID:      ${{ secrets.PBI_DATASET_ID }}
          TICKETMASTER_KEY:    ${{ secrets.TICKETMASTER_KEY }}
          CALENDARIFIC_KEY:    ${{ secrets.CALENDARIFIC_KEY }}
          EVENTS_TTL_DAYS:     '7'
          HOLIDAYS_TTL_DAYS:   '21'
          POOL_SIZE:           '12'
          QUERY_SPACING_MS:    '600'
          QUERY_TIMEOUT_MS:    '180000'
          CLIENTS:             'MT,OSH,REN,SBS,SCO,SG,ST,URB,VIC,CAT,CAT CORDOBA,CAT PORTO,CAT SAN SEBASTIAN,CEL,CINC,MIN-2,SAS,SHM,VVB'
        run: node scripts/generate.js
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "Rápidos 2/2 $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Sin cambios"
          git pull --rebase --autostash origin main || true
          git push || echo "nada"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
