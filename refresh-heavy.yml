name: Actualizar UN cliente

on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Código(s) de cliente a actualizar. Ej: MIN  |  o varios: AB,A3R  |  o __ALL__'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  one:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - name: Generar solo el/los cliente(s) indicados
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PBI_WORKSPACE_ID:    ${{ secrets.PBI_WORKSPACE_ID }}
          PBI_DATASET_ID:      ${{ secrets.PBI_DATASET_ID }}
          QUERY_SPACING_MS:    '800'
          QUERY_TIMEOUT_MS:    '60000'
          CLIENTS:             ${{ inputs.cliente }}
        run: node scripts/generate.js
      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "Actualizar ${{ inputs.cliente }}" || echo "Sin cambios"
          git push || echo "nada"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
